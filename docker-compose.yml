services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-merit_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-merit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-only}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-merit} -d ${POSTGRES_DB:-merit_assistant}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["sh", "-c", "alembic upgrade head && uvicorn merit_assistant.api.main:app --host 0.0.0.0 --port 8000 --reload"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-merit}:${POSTGRES_PASSWORD:-change-me-local-only}@db:5432/${POSTGRES_DB:-merit_assistant}
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./config:/app/config:ro
      - ./data/private:/app/data/private
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["streamlit", "run", "ui/app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - ./ui:/app/ui
    depends_on:
      - api

volumes:
  postgres_data:
